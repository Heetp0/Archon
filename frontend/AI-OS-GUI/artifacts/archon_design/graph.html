const COLORS={"mode": "#7c3aed", "component": "#2563eb", "ui-primitive": "#475569", "context": "#d97706", "hook": "#16a34a", "constant": "#0891b2", "lib": "#be185d", "type": "#64748b", "other": "#374151"};

const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let W,H,scale=1,ox=0,oy=0,dragging=false,lastMouse=null,selected=null;
const pos={};
NODES.forEach((n,i)=>{
  const a=(i/NODES.length)*Math.PI*2,r=300+Math.random()*220;
  pos[n.id]={x:Math.cos(a)*r,y:Math.sin(a)*r,vx:0,vy:0};
});
function sim(){
  const k=88,g=0.008;
  for(let it=0;it<80;it++){
    for(let i=0;i<NODES.length;i++)for(let j=i+1;j<NODES.length;j++){
      const a=pos[NODES[i].id],b=pos[NODES[j].id];
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=(k*k)/d;
      a.vx-=f*dx/d;a.vy-=f*dy/d;b.vx+=f*dx/d;b.vy+=f*dy/d;
    }
    EDGES.forEach(e=>{
      const a=pos[e.from],b=pos[e.to];if(!a||!b)return;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=d/k;
      a.vx+=f*dx/d;a.vy+=f*dy/d;b.vx-=f*dx/d;b.vy-=f*dy/d;
    });
    NODES.forEach(n=>{const p=pos[n.id];p.vx=(p.vx-p.x*g)*.85;p.vy=(p.vy-p.y*g)*.85;p.x+=p.vx;p.y+=p.vy;});
  }
}
sim();
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;draw();}
window.addEventListener('resize',resize);
function w2s(x,y){return{x:x*scale+W/2+ox,y:y*scale+H/2+oy};}
function s2w(x,y){return{x:(x-W/2-ox)/scale,y:(y-H/2-oy)/scale};}
function draw(){
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#09090b';ctx.fillRect(0,0,W,H);
  EDGES.forEach(e=>{
    const a=pos[e.from],b=pos[e.to];if(!a||!b)return;
    const sa=w2s(a.x,a.y),sb=w2s(b.x,b.y);
    const hot=selected&&(e.from===selected.id||e.to===selected.id);
    ctx.strokeStyle=hot?'rgba(167,139,250,.8)':'rgba(63,63,70,.35)';
    ctx.lineWidth=hot?1.5:.7;
    ctx.beginPath();ctx.moveTo(sa.x,sa.y);ctx.lineTo(sb.x,sb.y);ctx.stroke();
  });
  NODES.forEach(n=>{
    const p=w2s(pos[n.id].x,pos[n.id].y);
    const r=(selected&&selected.id===n.id)?11:7;
    const col=COLORS[n.category]||'#374151';
    ctx.shadowColor=col;ctx.shadowBlur=(selected&&selected.id===n.id)?20:8;
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=col;ctx.fill();ctx.shadowBlur=0;
    if(scale>.6){
      ctx.fillStyle='#d4d4d8';ctx.font=Math.round(9*scale)+'px monospace';
      ctx.textAlign='center';ctx.fillText(n.label,p.x,p.y-r-3);
    }
  });
}
canvas.addEventListener('mousedown',e=>{dragging=true;lastMouse={x:e.clientX,y:e.clientY};});
canvas.addEventListener('mouseup',e=>{
  const moved=lastMouse&&(Math.abs(e.clientX-lastMouse.x)>3||Math.abs(e.clientY-lastMouse.y)>3);

    selected=cl;
    const panel=document.getElementById('selected');
    if(cl){
      const imp=EDGES.filter(e=>e.from===cl.id).map(e=>e.to);
      const dep=EDGES.filter(e=>e.to===cl.id).map(e=>e.from);
      document.getElementById('sel-name').textContent=cl.label;
      document.getElementById('sel-path').textContent=cl.path;
      document.getElementById('sel-imports').innerHTML=
        '<b>Imports ('+imp.length+'):</b><br>'+(imp.map(i=>'<span style="color:#a78bfa">'+i.split('/').pop()+'</span>').join(', ')||'none')+
        '<br><br><b>Used by ('+dep.length+'):</b><br>'+(dep.map(i=>'<span style="color:#60a5fa">'+i.split('/').pop()+'</span>').join(', ')||'none');
      panel.style.display='block';
    }else panel.style.display='none';
  }
  dragging=false;
});
canvas.addEventListener('mousemove',e=>{if(dragging&&lastMouse){ox+=e.clientX-lastMouse.x;oy+=e.clientY-lastMouse.y;lastMouse={x:e.clientX,y:e.clientY};draw();}});
